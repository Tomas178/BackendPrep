name: CI

on: push

jobs:
  check:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [22.17.0]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

  build-deploy:
    needs: check
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: app-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup AWS Lightsail CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          sudo curl "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o "/usr/local/bin/lightsailctl"
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_LIGHTSAIL_REGION }}
          aws-access-key-id: ${{ secrets.AWS_LIGHTSAIL_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_LIGHTSAIL_SECRET_ACCESS_KEY }}

      - name: Build image
        run: docker build -t $IMAGE_TAG -f Dockerfile .

      - name: Push image to Lightsail
        run: >-
          aws lightsail push-container-image
          --service-name ${{ vars.AWS_LIGHTSAIL_SERVICE }}
          --label $IMAGE_TAG
          --image $IMAGE_TAG
          --output yaml

      - name: Get Lightsail image tag
        run: |
          echo "LIGHTSAIL_IMAGE=$(aws lightsail get-container-images --service-name ${{ vars.AWS_LIGHTSAIL_SERVICE }} | jq -r '.containerImages[] | select(.image | contains(".'$IMAGE_TAG'")) | .image')" >> $GITHUB_ENV

      - name: Create containers.json
        run: |
          echo '{
            "app": {
              "image": "${{ env.LIGHTSAIL_IMAGE }}",
              "ports": {
                "3000": "HTTP"
              },
              "environment": {
                "NODE_ENV": "production",
                "HOSTNAME": "0.0.0.0",
                "PORT": "3000",
                "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
                "ANTHROPIC_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}",
                "GOOGLE_API_KEY": "${{ secrets.GOOGLE_API_KEY }}"
              }
            }
          }' > containers.json

      - name: Create public-endpoint.json
        run: |
          echo '{
            "containerName": "app",
            "containerPort": 3000,
            "healthCheck": {
              "intervalSeconds": 10,
              "path": "/api/health"
            }
          }' > public-endpoint.json

      - name: Deploy to AWS Lightsail
        run: |
          aws lightsail create-container-service-deployment \
          --service-name ${{ vars.AWS_LIGHTSAIL_SERVICE }} \
          --containers file://containers.json \
          --public-endpoint file://public-endpoint.json
